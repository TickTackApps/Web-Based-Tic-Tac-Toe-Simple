<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        *{

            margin: 0px;
            padding: 0px;

        }

        body{

            background-color: green;
            text-align: center;
            

        }

        .container{

            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;

        }

        .game{

            height: 60vmin;
            width: 60vmin;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;

        }

        .box{

            height: 18vmin;
            width: 18vmin;
            border-radius: 1rem;
            border: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            font-size: 8vmin;
            background-color: blanchedalmond;
            color: black;

        }

        #reset{

            padding: 1rem;
            font-size: 1.2rem;
            color: white;
            border-radius: 1rem;
            background-color: black;
            border: none;

        }

    </style>
</head>
<body>
    
    <main>
        <h1>Tic Tac Toe</h1>
        <h1 class = "whowin"></h1>
        <div class="container">
            <div class="game">
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>
            </div>
        </div>
        <button id="reset">Reset Game</button>
    </main>
<script>
    let boxes = document.querySelectorAll(".box");
    let winner = document.querySelector(".whowin");
    let resetBtn = document.querySelector("#reset");

    let turnO = true;

    let winPatterns = [
        [0,1,2],
        [0,3,6],
        [0,4,8],
        [1,4,7],
        [2,5,8],
        [2,4,6],
        [3,4,5],
        [6,7,8]
    ];

    resetBtn.addEventListener("click", () => {

        boxes.forEach((box) => {

            box.disabled = false;
            box.innerText = "";
            box.style.backgroundColor = "blanchedalmond";
            winner.innerText ="";

        })

    });

    boxes.forEach((box) => {
        box.addEventListener("click", () => {
            
            if(box.textContent == ""){
                if(turnO){
                    box.innerText = "O";
                    turnO = false;
                }else{
                    box.innerText = "X";
                    turnO = true;
                }
            }

            checkWinner();

        });
    });

    const checkWinner = () => {

        for(pattern of winPatterns){

            if(boxes[pattern[0]].textContent==boxes[pattern[1]].textContent &&
                boxes[pattern[1]].textContent==boxes[pattern[2]].textContent && boxes[pattern[2]].textContent != ""){

                    boxes.forEach((box) => {

                        box.disabled = true;

                    })
                    boxes[pattern[0]].style.backgroundColor = "yellow";
                    boxes[pattern[1]].style.backgroundColor = "yellow";
                    boxes[pattern[2]].style.backgroundColor = "yellow";
                    winner.innerText = boxes[pattern[0]].textContent + " is winner"
            }

        }

    }
</script>
</body>
</html>
